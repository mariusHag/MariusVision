<!DOCTYPE html>
<html lang="en">
    <head>
        <base href="/">
        <link href="style.css" rel="stylesheet" type="text/css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Marius Vision - Contact</title>
    </head>
    <body>
        <header>
            <div class="header-inner">
                <div class="container">
                    <nav>
                        <div class="logo"><a href="/"> <img src="images/logokanaa.svg" alt="Designer Portrait"> </a>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <ul class="nav-menu">
                                <li><a href="/#services">Portfolio</a>
                                </li>
                                <li><a href="/contact/">Contact</a>
                                </li>
                            </ul>
                        </div>
                    </nav>
                </div>
            </div>
        </header>
        <section id="pricing-hero" class="about-section">
            <div class="container">
</div>
        </section>
        <section id="contact-form">
            <div class="container">
                <div class="services-container">
                    <div class="portfolio-sidebar">
                        <h3>Contact</h3>
                        <!-- Contact Info Description -->
                        <div class="portfolio-description">
                            Write if you want to discuss architecture, visual work, research, or a world that needs to feel more alive.
</div>
                        <!-- Social Media Links -->
                        <div class="social-links"><a href="https://www.instagram.com/mariushagelskjaer" target="_blank" rel="noopener" class="social-icon" aria-label="Instagram"><i class="fa fa-instagram"></i></a><a href="https://dk.linkedin.com/in/marius-hagelskj%C3%A6r" target="_blank" rel="noopener" class="social-icon" aria-label="LinkedIn"><i class="fa fa-linkedin"></i></a><a href="mailto:mariushagelskjaer@gmail.com" class="social-icon" aria-label="Email"><i class="fa fa-envelope"></i></a>
                        </div>
                        <!-- Contact QR Code -->
                        <div class="qr-code">
                            <img src="/images/MV1.png" alt="Contact QR Code"><span>Scan to connect</span>
                        </div>
                    </div>
                    <div class="contact-form-container">
                        <form class="contact-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="name">Name</label>
                                    <input type="text" id="name" required>
                                </div>
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="service">What are you interested in?</label>
                                <select id="service">
                                    <option value="">Choose a direction</option>
                                    <option value="architecture">Architecture project</option>
                                    <option value="visual">Visual or image work</option>
                                    <option value="research">Research conversation</option>
                                    <option value="game">Game or worldbuilding</option>
                                    <option value="collaboration">Collaboration</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="message">Project Details</label>
                                <textarea id="message" required></textarea>
                            </div>
                            <button type="submit" class="submit-btn">Open email</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
        <script src="footer.js"></script>
        <script src="site.js"></script>
    </body>
</html>
